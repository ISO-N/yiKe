<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忆刻 - 备份与恢复</title>
  <link rel="stylesheet" href="./material-app.css">
</head>
<body class="page-bg">
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <p class="eyebrow">Backup & Restore</p>
        <h1 class="screen-title">备份与恢复</h1>
      </div>
      <a class="icon-button" href="./settings.html" aria-label="返回设置">返</a>
    </header>

    <section class="section warning-card">
      <p class="eyebrow">Risk Notice</p>
      <h2 class="screen-title">恢复会覆盖当前本地全部数据</h2>
      <p class="supporting">之所以把风险放在页面顶部，是为了让用户在执行前先理解不可逆后果，而不是事后后悔。</p>
    </section>

    <section class="section state-banner">
      <div class="row">
        <div>
          <h2 class="screen-title">最近备份</h2>
          <p class="supporting">2026-03-14 21:08 · 本地文件</p>
        </div>
        <span class="badge">可用</span>
      </div>
    </section>

    <section class="section">
      <div class="list-stack">
        <article class="list-item">
          <h3 class="list-title">导出完整备份</h3>
          <p class="meta-line">包含卡组、卡片、问题、调度状态和复习记录。</p>
          <div class="button-row">
            <button class="primary-button" type="button">导出 JSON</button>
            <button class="secondary-button" type="button">复制路径</button>
          </div>
        </article>
        <article class="list-item">
          <h3 class="list-title">从备份恢复</h3>
          <p class="meta-line">恢复前建议先手动导出当前数据，避免误操作后无法回滚。</p>
          <div class="button-row">
            <button class="secondary-button" type="button">选择文件</button>
            <button class="primary-button" type="button">确认恢复</button>
          </div>
        </article>
      </div>
    </section>
  </div>
</body>
</html>
