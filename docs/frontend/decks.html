<!DOCTYPE html>

<body class="page-bg">

        <article class="list-item">
          <div class="row">
            <h3 class="list-title">英语词组</h3>
            <span class="badge">2 题到期</span>

          <a class="nav-pill" href="./cards.html">进入卡组</a>
