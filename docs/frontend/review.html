<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忆刻 - 复习页</title>
  <link rel="stylesheet" href="./material-app.css">
</head>
<body class="page-bg">
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <p class="eyebrow">高等数学 / 第一章 极限</p>
        <h1 class="screen-title">第 2 题，共 5 题</h1>
      </div>
      <a class="icon-button" href="./home.html" aria-label="退出复习">退</a>
    </header>

    <section class="section state-banner">
      <div class="row">
        <p class="meta-line">本卡完成度</p>
        <span class="badge">40%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:40%;"></div>
      </div>
    </section>

    <section class="section question-card">
      <p class="eyebrow">问题</p>
      <p class="question-text">为什么数列极限的定义中，要要求对任意的 ε 都成立？</p>
      <p class="supporting">先在脑中组织答案，再展开下方内容。</p>
    </section>

    <section class="section answer-card">
      <div class="row" style="margin-bottom:12px;">
        <h2 class="screen-title">答案</h2>
        <span class="badge">已展开</span>
      </div>
      <p class="supporting">
        因为极限描述的是“可以无限逼近”的稳定性。只有对任意足够小的误差范围都能找到对应的 N，
        才能说明这个数列真正收敛到那个值，而不是只在某个固定精度下看起来接近。
      </p>
    </section>

    <section class="section">
      <div class="row" style="margin-bottom:12px;">
        <h2 class="screen-title">这题掌握得怎么样？</h2>
        <span class="badge is-warm">评分后自动下一题</span>
      </div>
      <div class="rating-grid">
        <button class="rating-button is-critical" type="button">完全不会</button>
        <button class="rating-button is-soft" type="button">有印象</button>
        <button class="rating-button is-good" type="button">基本会</button>
        <button class="rating-button is-best" type="button">很轻松</button>
      </div>
    </section>

    <section class="section">
      <div class="button-row">
        <button class="secondary-button" type="button">返回题面</button>
        <button class="primary-button" type="button">记录并继续</button>
      </div>
    </section>
  </div>
</body>
</html>
