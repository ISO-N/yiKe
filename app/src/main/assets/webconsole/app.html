<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忆刻网页后台</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body data-page="app">
<div class="app-page-shell">
    <header class="glass-topbar">
        <div class="topbar-main">
            <div class="topbar-brand">
                <button id="nav-menu-toggle" class="ghost-button nav-menu-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">☰ 菜单导航</button>
                <div>
                    <p class="eyebrow">局域网控制台</p>
                    <h1 id="section-title">学习工作区</h1>
                    <p id="session-summary" class="muted">正在读取服务状态…</p>
                </div>
            </div>
            <nav id="primary-nav" class="primary-nav" aria-label="主导航">
                <div class="nav-group">
                    <p class="nav-group-label">学习核心</p>
                    <div class="nav-group-links">
                        <a class="nav-button" data-page-link="study" href="/study">学习</a>
                        <a class="nav-button" data-page-link="overview" href="/overview">概览</a>
                        <a class="nav-button" data-page-link="analytics" href="/analytics">统计</a>
                    </div>
                </div>
                <div class="nav-group">
                    <p class="nav-group-label">内容维护</p>
                    <div class="nav-group-links">
                        <a class="nav-button" data-page-link="content" href="/content">内容管理</a>
                        <a class="nav-button" data-page-link="search" href="/search">搜索</a>
                    </div>
                </div>
                <div class="nav-group">
                    <p class="nav-group-label">系统管理</p>
                    <div class="nav-group-links">
                        <a class="nav-button" data-page-link="settings" href="/settings">设置</a>
                        <a class="nav-button" data-page-link="backup" href="/backup">备份</a>
                    </div>
                </div>
            </nav>
        </div>
        <div class="topbar-meta">
            <div id="shell-status" class="status-chip-row"></div>
            <div class="topbar-actions">
                <button id="refresh-button" class="ghost-button" type="button">刷新数据</button>
                <a id="logout-button" class="ghost-button button-link" href="/logout">退出登录</a>
            </div>
            <div id="global-message" class="toast" hidden></div>
        </div>
    </header>

    <main class="main-shell">
        <section class="context-strip card">
            <div class="context-strip-main">
                <p class="eyebrow">Workspace Context</p>
                <h2 id="context-title">学习工作区</h2>
                <p id="context-description" class="muted">浏览器端会持续保留最近一次有效工作区上下文。</p>
            </div>
            <div id="context-meta" class="context-meta"></div>
            <div id="context-actions" class="context-actions"></div>
        </section>

        <section id="page-root" class="page-root"></section>
    </main>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
